server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /personal-sites_V2/ {
        alias /usr/share/nginx/html/personal-sites_V2/;
        try_files $uri $uri/ /personal-sites_V2/index.html;
    }

    location = / {
        return 301 /personal-sites_V2/;
    }
}
