<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="940" cy="315" r="190"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle radial glow -->
  <ellipse cx="900" cy="200" rx="400" ry="300" fill="rgba(37,99,235,0.08)"/>
  <ellipse cx="200" cy="500" rx="300" ry="200" fill="rgba(124,58,237,0.07)"/>
  <!-- Avatar circle (right side) — image injected by generate-og.js -->
  <circle cx="940" cy="315" r="195" fill="url(#accent)"/>
  <image x="750" y="125" width="380" height="380" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMin slice" href="AVATAR_PLACEHOLDER"/>
  <!-- Name -->
  <text x="80" y="320" font-family="system-ui,sans-serif" font-size="72" font-weight="800" fill="#e6edf3" letter-spacing="-2">蔡龍佑</text>
  <text x="80" y="395" font-family="system-ui,sans-serif" font-size="48" font-weight="700" fill="#e6edf3" letter-spacing="-1">Lung-Yu Tsai</text>
  <!-- Title -->
  <text x="80" y="455" font-family="system-ui,sans-serif" font-size="26" fill="#8b949e">Technical Manager · DevSecOps · AI · Cybersecurity</text>
  <!-- Tag line -->
  <text x="80" y="510" font-family="system-ui,sans-serif" font-size="22" fill="#58a6ff">Taipei, Taiwan · lung-yu.github.io/personal-sites_V2</text>
  <!-- Accent bar -->
  <rect x="80" y="555" width="200" height="4" rx="2" fill="url(#accent)"/>
</svg>
